<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-labelledby="title desc">
  <title id="title">Paper Agent Harness Pipeline</title>
  <desc id="desc">End-to-end flow from paper PDF or text input through analysis, implementation planning, validation, review, and final reports.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3a4a"/>
    </marker>
    <style>
      .bg { fill: #f7f8fa; }
      .title { font: 700 28px Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #5b6678; }
      .lane { fill: #ffffff; stroke: #d9dee7; stroke-width: 1.4; }
      .node { fill: #fdfefe; stroke: #506078; stroke-width: 1.6; }
      .input { fill: #eaf4ff; stroke: #2367a8; }
      .llm { fill: #edf8f1; stroke: #2f7d4f; }
      .artifact { fill: #fff7e6; stroke: #a66b00; }
      .review { fill: #f3edff; stroke: #6746a3; }
      .label { font: 700 15px Arial, sans-serif; fill: #172033; }
      .small { font: 400 12.5px Arial, sans-serif; fill: #4e5a6b; }
      .lane-title { font: 700 14px Arial, sans-serif; fill: #39485c; }
      .arrow { stroke: #2f3a4a; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 7 5; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1320" height="760"/>
  <text class="title" x="56" y="58">Paper Agent Harness Pipeline</text>
  <text class="subtitle" x="56" y="84">Single Orchestrator workflow with real PDF text extraction and optional LLM-backed paper analysis.</text>

  <rect class="lane" x="40" y="120" width="1240" height="130" rx="8"/>
  <text class="lane-title" x="60" y="148">Input and analysis</text>
  <rect class="node input" x="70" y="170" width="170" height="52" rx="8"/>
  <text class="label" x="96" y="194">Paper file</text>
  <text class="small" x="92" y="212">PDF, Markdown, text</text>

  <rect class="node input" x="290" y="170" width="190" height="52" rx="8"/>
  <text class="label" x="328" y="194">PaperReader</text>
  <text class="small" x="319" y="212">pypdf text extraction</text>

  <rect class="node llm" x="530" y="156" width="210" height="80" rx="8"/>
  <text class="label" x="571" y="184">PaperAnalyzer</text>
  <text class="small" x="566" y="205">heuristic by default</text>
  <text class="small" x="556" y="223">LLM when configured</text>

  <rect class="node artifact" x="800" y="170" width="210" height="52" rx="8"/>
  <text class="label" x="837" y="194">Analysis artifacts</text>
  <text class="small" x="827" y="212">summary and spec</text>

  <line class="arrow" x1="240" y1="196" x2="286" y2="196"/>
  <line class="arrow" x1="480" y1="196" x2="526" y2="196"/>
  <line class="arrow" x1="740" y1="196" x2="796" y2="196"/>

  <rect class="lane" x="40" y="290" width="1240" height="130" rx="8"/>
  <text class="lane-title" x="60" y="318">Planning and implementation scaffold</text>
  <rect class="node" x="110" y="340" width="190" height="52" rx="8"/>
  <text class="label" x="143" y="364">Implementation</text>
  <text class="small" x="162" y="382">Planner</text>

  <rect class="node" x="360" y="340" width="190" height="52" rx="8"/>
  <text class="label" x="407" y="364">ToolRegistry</text>
  <text class="small" x="393" y="382">default tools first</text>

  <rect class="node" x="610" y="340" width="190" height="52" rx="8"/>
  <text class="label" x="651" y="364">CodeImplementer</text>
  <text class="small" x="655" y="382">MVP scaffold</text>

  <rect class="node artifact" x="860" y="326" width="250" height="80" rx="8"/>
  <text class="label" x="914" y="354">Plan artifacts</text>
  <text class="small" x="898" y="375">implementation_plan.md</text>
  <text class="small" x="906" y="393">tooling_plan.md</text>

  <line class="arrow" x1="905" y1="222" x2="905" y2="322"/>
  <line class="arrow" x1="300" y1="366" x2="356" y2="366"/>
  <line class="arrow" x1="550" y1="366" x2="606" y2="366"/>
  <line class="arrow" x1="800" y1="366" x2="856" y2="366"/>

  <rect class="lane" x="40" y="460" width="1240" height="190" rx="8"/>
  <text class="lane-title" x="60" y="488">Validation, reviewer sub-agent, and reporting</text>
  <rect class="node" x="95" y="520" width="180" height="52" rx="8"/>
  <text class="label" x="143" y="544">Validator</text>
  <text class="small" x="128" y="562">unit/smoke checks</text>

  <rect class="node review" x="335" y="506" width="210" height="80" rx="8"/>
  <text class="label" x="370" y="534">Reviewer module</text>
  <text class="small" x="366" y="555">coverage, fidelity,</text>
  <text class="small" x="365" y="573">reproducibility</text>

  <rect class="node" x="605" y="520" width="190" height="52" rx="8"/>
  <text class="label" x="649" y="544">Revision</text>
  <text class="small" x="646" y="562">decision flag</text>

  <rect class="node artifact" x="855" y="492" width="260" height="108" rx="8"/>
  <text class="label" x="925" y="520">Final outputs</text>
  <text class="small" x="887" y="542">review_report.md</text>
  <text class="small" x="887" y="560">alignment_matrix.md</text>
  <text class="small" x="887" y="578">final_report.md, README</text>

  <line class="arrow" x1="985" y1="406" x2="985" y2="488"/>
  <line class="arrow" x1="275" y1="546" x2="331" y2="546"/>
  <line class="arrow" x1="545" y1="546" x2="601" y2="546"/>
  <line class="arrow" x1="795" y1="546" x2="851" y2="546"/>

  <rect class="node llm" x="1055" y="142" width="190" height="94" rx="8"/>
  <text class="label" x="1098" y="170">External LLM</text>
  <text class="small" x="1082" y="191">OpenAI-compatible</text>
  <text class="small" x="1086" y="209">chat completions</text>
  <line class="arrow dashed" x1="1055" y1="190" x2="744" y2="190"/>

  <text class="subtitle" x="56" y="704">CLI example: paper-agent run --paper paper.pdf --out runs/run --llm-provider openai-compatible --llm-model MODEL</text>
</svg>
